name: Deploy Dashboard to Vercel (Nuclear Bridge)

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_h4JhRvWvayMJYeKS0fRwU48u
          vercel-project-id: prj_RsRGJep93YEtQXaniUqiLyq8qhMc
          vercel-args: '--prod'
          working-directory: ./dashboard
