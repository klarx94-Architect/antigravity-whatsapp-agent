name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd dashboard
          npm install
          npm install framer-motion

      - name: Build with Next.js
        run: |
          cd dashboard
          npm run build
          mv out ../docs

      - name: Inspect Build (Nuclear Check)
        run: |
          echo "Listing docs contents:"
          ls -R docs
          echo "Checking index.html paths:"
          grep -o 'href="[^"]*"' docs/index.html | head -n 20
          grep -o 'src="[^"]*"' docs/index.html | head -n 20

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
